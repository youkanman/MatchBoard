<script>
// =============================================
// 定数・状態
// =============================================
var SK   = "thunders_v4";
var SK_CLUB = "club_config";
var DEF_HDR = "FC KAMIFUKUOKA THUNDERS";
var DEF_FTR = "⚡ THUNDERS";
var CATS = ["U12","U11","U10","U9","U8","U7","Girls"];
var seq  = 0;
var category = "U12";

// =============================================
// 起動
// =============================================
window.onload = function() {
  buildCats("U12");
  loadClub();
  load();
};

function setDate() {
  var d = new Date();
  document.getElementById("bdate").textContent =
    d.getFullYear() + "." + pad(d.getMonth()+1) + "." + pad(d.getDate());
}
function pad(n) { return ("0"+n).slice(-2); }

// =============================================
// カテゴリ
// =============================================
function buildCats(selected) {
  category = selected || "U12";
  var html = "";
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    html += '<button class="cbtn' + (c===category?" on":"") + '" onclick="setCategory(\'' + c + '\')">' + c + '</button>';
  }
  document.getElementById("cats").innerHTML = html;
}

function setCategory(c) {
  category = c;
  var btns = document.querySelectorAll(".cbtn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = "cbtn" + (btns[i].textContent===c?" on":"");
  }
  saveData();
}

// =============================================
// 試合カード追加
// =============================================
function addMatch(data) {
  seq++;
  var id      = seq;
  var name    = (data && data.name)      ? data.name      : "";
  var opp     = (data && data.opponent)  ? data.opponent  : "";
  var us      = (data && data.scoreUs   !== undefined) ? data.scoreUs   : "";
  var them    = (data && data.scoreThem !== undefined) ? data.scoreThem : "";
  var isTM    = (data && data.isTM)      ? true : false;

  var div = document.createElement("div");
  div.className = "mc";
  div.id = "mc"+id;
  div.innerHTML =
    '<div class="mch">' +
      '<span class="mno">MATCH <span id="mn'+id+'"></span></span>' +
      '<div class="mchr">' +
        '<button class="tmbtn'+(isTM?" on":"")+'" id="tm'+id+'" onclick="toggleTM('+id+')">TM</button>' +
        '<button class="rmbtn" onclick="remMatch('+id+')">✕</button>' +
      '</div>' +
    '</div>' +
    '<div class="fg">' +
      '<label class="flbl">試合名・メモ <span class="opt">（任意）</span></label>' +
      '<input type="text" id="na'+id+'" value="'+esc(name)+'" placeholder="試合名・メモ（任意）" oninput="saveData()">' +
    '</div>' +
    '<div class="fg">' +
      '<label class="flbl">対戦相手</label>' +
      '<input type="text" id="op'+id+'" value="'+esc(opp)+'" placeholder="対戦チーム名" oninput="saveData()">' +
    '</div>' +
    '<div id="sa'+id+'"'+(isTM?' style="display:none"':'')+'>'+
      '<div class="sr">' +
        '<div><label class="flbl">得点</label><input type="number" class="sinp" id="su'+id+'" value="'+esc(us)+'" placeholder="0" min="0" oninput="saveData()"></div>' +
        '<div class="ssep">−</div>' +
        '<div><label class="flbl">失点</label><input type="number" class="sinp" id="st'+id+'" value="'+esc(them)+'" placeholder="0" min="0" oninput="saveData()"></div>' +
      '</div>' +
    '</div>' +
    '<div id="tb'+id+'"'+(!isTM?' style="display:none"':'')+'>'+
      '<span class="tmbdg">⚽ トレーニングマッチ</span>' +
    '</div>';

  document.getElementById("mlist").appendChild(div);
  renum();
  saveData();
}

function toggleTM(id) {
  var btn = document.getElementById("tm"+id);
  var sa  = document.getElementById("sa"+id);
  var tb  = document.getElementById("tb"+id);
  var on  = btn.className.indexOf("on") < 0; // 現在onでなければtrue
  btn.className = "tmbtn" + (on?" on":"");
  sa.style.display = on ? "none" : "";
  tb.style.display = on ? ""     : "none";
  saveData();
}

function remMatch(id) {
  var el = document.getElementById("mc"+id);
  if (el) el.parentNode.removeChild(el);
  renum();
  saveData();
}

function renum() {
  var cards = document.querySelectorAll(".mc");
  for (var i = 0; i < cards.length; i++) {
    var id = cards[i].id.replace("mc","");
    var el = document.getElementById("mn"+id);
    if (el) el.textContent = i+1;
  }
}

// =============================================
// ビュー切り替え（試合結果はfixedで上に重ねる）
// =============================================
function showBoard() {
  renderBoard();
  document.getElementById("vb").style.display = "block";
  document.getElementById("bni").className = "nbtn";
  document.getElementById("bnb").className = "nbtn on";
  document.getElementById("vb").scrollTop = 0;
}

function showInput() {
  document.getElementById("vb").style.display = "none";
  document.getElementById("bni").className = "nbtn on";
  document.getElementById("bnb").className = "nbtn";
}

// =============================================
// 試合結果レンダリング（入力画面のDOMから直接読む）
// =============================================
function renderBoard() {
  var title = document.getElementById("ftitle").value;
  var msg   = document.getElementById("fmsg").value;
  var fdate = document.getElementById("fdate").value;

  // 日付を YYYY.MM.DD 形式に変換（入力なければ今日）
  var dateStr = "";
  if (fdate) {
    var parts = fdate.split("-");
    dateStr = parts[0] + "." + parts[1] + "." + parts[2];
  } else {
    var d = new Date();
    dateStr = d.getFullYear() + "." + pad(d.getMonth()+1) + "." + pad(d.getDate());
  }

  var club = loadClubData();
  document.getElementById("bclub").textContent = club.hdr;
  document.getElementById("bttl").innerHTML = '<span class="brsl">RESULT</span><span>' + esc(title || "MATCH RESULT") + '</span>';
  document.getElementById("bcat").textContent  = category;
  document.getElementById("bdate").textContent = dateStr;

  var cards = document.querySelectorAll(".mc");
  var el    = document.getElementById("brows");

  if (cards.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--t4);font-size:14px;">試合データがありません</div>';
  } else {
    var html = "";
    for (var i = 0; i < cards.length; i++) {
      var id   = cards[i].id.replace("mc","");
      var name = document.getElementById("na"+id).value;
      var opp  = document.getElementById("op"+id).value;
      var suEl = document.getElementById("su"+id);
      var stEl = document.getElementById("st"+id);
      var tmOn = document.getElementById("tm"+id).className.indexOf("on") >= 0;
      var su   = suEl ? suEl.value : "";
      var st   = stEl ? stEl.value : "";

      var r = null;
      if (!tmOn && su !== "" && st !== "") {
        var u = Number(su), t = Number(st);
        r = u > t ? "WIN" : u < t ? "LOSE" : "DRAW";
      }
      var rc = r==="WIN"?"var(--win)":r==="LOSE"?"var(--lose)":r==="DRAW"?"var(--draw)":"var(--t2)";
      var rb = r==="WIN"?"rgba(0,230,118,.12)":r==="LOSE"?"rgba(255,82,82,.12)":r==="DRAW"?"rgba(255,171,64,.12)":"rgba(144,202,249,.1)";
      var bc = r==="WIN"?"rgba(0,230,118,.2)":r==="LOSE"?"rgba(255,82,82,.2)":r==="DRAW"?"rgba(255,171,64,.2)":"rgba(255,255,255,.07)";

      var nameH = name ? '<div class="bmn">'+esc(name)+'</div>' : "";
      var oppH  = opp  ? '<div class="bopp">'+esc("vs "+opp)+'</div>'
                       : '<div class="bopp"><span style="color:var(--t4)">相手未入力</span></div>';
      var rgtH  = tmOn
        ? '<span class="btm">⚽ トレーニングマッチ</span>'
        : r
          ? '<span class="bbdg" style="color:'+rc+';background:'+rb+'">'+r+'</span><span class="bscr" style="color:'+rc+'">'+esc(su)+'<span style="color:var(--t4);font-size:20px"> - </span>'+esc(st)+'</span>'
          : '<span style="color:var(--t4);font-size:13px">未入力</span>';

      html += '<div class="brow" style="border-color:'+bc+'">'+
                '<div class="blft"><span class="bidx">'+(i+1)+'</span><div style="min-width:0">'+nameH+oppH+'</div></div>'+
                '<div class="brgt">'+rgtH+'</div>'+
              '</div>';
    }
    el.innerHTML = html;
  }

  document.getElementById("bftr").innerHTML =
    (msg ? '<div class="bmsg"><span class="bmic">💬</span><span class="bmtx">'+esc(msg)+'</span></div>' : "") +
    '<div class="bline"></div><div class="bbrnd">'+esc(club.ftr)+'</div>';
}

// =============================================
// 画像保存
// =============================================
async function saveImage(mode) {
  var btnDl = document.getElementById("savbtn-dl");
  var btnSh = document.getElementById("savbtn-sh");
  btnDl.disabled = true; btnSh.disabled = true;
  var btn = mode === "share" ? btnSh : btnDl;
  var origText = btn.textContent;
  btn.textContent = "⏳ 生成中...";
  try {
    var canvas = await html2canvas(document.getElementById("bcard"), {
      backgroundColor:"#0a1020", scale:2, useCORS:true, logging:false
    });
    canvas.toBlob(async function(blob) {
      if (mode === "share") {
        var file = new File([blob], "thunders_match.png", {type:"image/png"});
        if (navigator.canShare && navigator.canShare({files:[file]})) {
          await navigator.share({files:[file], title:"試合結果"});
        } else {
          alert("お使いの環境では共有機能に対応していません。「ダウンロード」をお使いください。");
        }
      } else {
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "thunders_match.png";
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }, "image/png");
  } catch(e) { alert("画像生成に失敗: "+e.message); }
  btnDl.disabled = false; btnSh.disabled = false;
  btn.textContent = origText;
}

// =============================================
// ローカルストレージ保存・読込
// =============================================
function saveData() {
  var cards = document.querySelectorAll(".mc");
  var matches = [];
  for (var i = 0; i < cards.length; i++) {
    var id = cards[i].id.replace("mc","");
    var suEl = document.getElementById("su"+id);
    var stEl = document.getElementById("st"+id);
    matches.push({
      name:      document.getElementById("na"+id).value,
      opponent:  document.getElementById("op"+id).value,
      scoreUs:   suEl ? suEl.value : "",
      scoreThem: stEl ? stEl.value : "",
      isTM:      document.getElementById("tm"+id).className.indexOf("on") >= 0,
    });
  }
  var data = {
    title:    document.getElementById("ftitle").value,
    message:  document.getElementById("fmsg").value,
    date:     document.getElementById("fdate").value,
    category: category,
    matches:  matches,
  };
  try { localStorage.setItem(SK, JSON.stringify(data)); } catch(e) {}
}

function load() {
  try {
    var raw = localStorage.getItem(SK);
    if (!raw) { addMatch(); return; }
    var d = JSON.parse(raw);
    document.getElementById("ftitle").value = d.title   || "";
    document.getElementById("fmsg").value   = d.message || "";
    document.getElementById("fdate").value  = d.date    || "";
    buildCats(d.category || "U12");
    if (d.matches && d.matches.length > 0) {
      for (var i = 0; i < d.matches.length; i++) addMatch(d.matches[i]);
    } else {
      addMatch();
    }
  } catch(e) { addMatch(); }
}

// =============================================
// クリア
// =============================================
function confirmClear() { document.getElementById("mdl").style.display = "flex"; }
function closeMdl()     { document.getElementById("mdl").style.display = "none"; }
function doClear() {
  document.getElementById("ftitle").value = "";
  document.getElementById("fmsg").value   = "";
  document.getElementById("fdate").value  = "";
  document.getElementById("mlist").innerHTML = "";
  seq = 0;
  buildCats("U12");
  try { localStorage.removeItem(SK); } catch(e) {}
  addMatch();
  closeMdl();
  showInput();
}

// =============================================
// クラブ設定（永続化・クリア対象外）
// =============================================
function loadClubData() {
  try {
    var raw = localStorage.getItem(SK_CLUB);
    if (raw) {
      var d = JSON.parse(raw);
      return { hdr: d.hdr || DEF_HDR, ftr: d.ftr || DEF_FTR };
    }
  } catch(e) {}
  return { hdr: DEF_HDR, ftr: DEF_FTR };
}

function loadClub() {
  var club = loadClubData();
  document.getElementById("cfg-hdr").value = club.hdr;
  document.getElementById("cfg-ftr").value = club.ftr;
}

function saveClub() {
  var hdr = document.getElementById("cfg-hdr").value.trim() || DEF_HDR;
  var ftr = document.getElementById("cfg-ftr").value.trim() || DEF_FTR;
  try { localStorage.setItem(SK_CLUB, JSON.stringify({hdr:hdr, ftr:ftr})); } catch(e) {}
}

function toggleCfg() {
  var bdy = document.getElementById("cfgbdy");
  var arw = document.getElementById("cfgarw");
  var open = bdy.classList.toggle("open");
  arw.classList.toggle("open", open);
}

// =============================================
// HTMLエスケープ
// =============================================
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
